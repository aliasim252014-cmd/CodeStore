<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codestore - Yazılım ve Oyun Pazarı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">CodeStore</div>
        <div class="nav-links">
            <a href="#">Oyunlar</a>
            <a href="#">Scriptler</a>
            <a href="#" class="btn-primary">Giriş Yap</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Dünyanın En İyi Scriptleri Burada</h1>
        <p>Projelerinizi hızlandıracak hazır kod blokları ve oyunlar.</p>
    </header>

    <main class="container">
        <div class="grid">
            <!-- Ürün Kartı -->
            <div class="card">
                <div class="card-img" style="background: #6200ea;"></div>
                <h3>E-Ticaret Scripti</h3>
                <p>Profesyonel satış altyapısı.</p>
                <button class="btn-buy">Satın Al - $49</button>
            </div>
            
            <div class="card">
                <div class="card-img" style="background: #00c853;"></div>
                <h3>Platform Oyunu</h3>
                <p>Unity ile geliştirilmiş 2D oyun.</p>
                <button class="btn-buy">Satın Al - $29</button>
            </div>
        </div>
    </main>
</body>
</html>
